<div id="ixc-tftp-server-view" class="ixc-menu-content" style="display: none;">
    <form style="width: 50%;margin: auto;min-width: 400px;" class="ixc-conf-form"
          enctype="application/x-www-form-urlencoded" method="post" action="${self.url_prefix}/ip-rewrite-for-pass">
        <h4>IP直通</h4>
        <div class="ixc-empty"></div>
        <div class="ixc-prompt">一般用于管理WAN口的桥接设备</div>
        <div class="form-group row">
            <div class="col-sm-2">是否开启</div>
            <div class="col-sm-10">
                <div class="form-check">
                    <%
                        s="""<input class="form-check-input" type="checkbox" value="1" name="enable" {}/>"""
                        if self.V["enable"]:x=s.format("checked")
                        else:x=s.format("{}")
                        self.show(x)
                    %>
                    <label class="form-check-label" for="gridCheck1">
                        开启
                    </label>
                </div>
            </div>
        </div>
        <div class="form-group row">
            <label for="inputEmail3" class="col-sm-2 col-form-label">目标IP地址</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="dest_ip" placeholder="0.0.0.0"
                       value="${self.V['dest_ip']}"/>
            </div>
        </div>

        <div class="form-group row">
            <label for="inputEmail3" class="col-sm-2 col-form-label">原始局域网IP</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="old_src_ip" placeholder="0.0.0.0"
                       value="${self.V['old_src_ip']}"/>
            </div>
        </div>
        <div class="form-group row">
            <label for="inputEmail3" class="col-sm-2 col-form-label">新的局域网IP</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" name="new_src_ip" placeholder="0.0.0.0"
                       value="${self.V['new_src_ip']}"/>
            </div>
        </div>
        <div class="form-group row">
            <div class="col-sm-12">
                <button type="submit" class="btn btn-primary float-lg-right">确定</button>
            </div>
        </div>
    </form>
</div>
